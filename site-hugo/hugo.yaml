    Title: Wait a Minute, Who Are You?
    Content: |
      Good Question; fair and concise... I'm Dan Dean. 

      I'm working as a DevOps engineer, but I joke that a more accurate
      title would be DevSecRelFinOps Engineer & SRE (I bill by the syllable).
      My team and I solve all of the behind-the-scenes, cloud-native issues that we
      face at our company to keep the applications running securly and reliably in the cloud.
      In my free time I enjoy learning new technologies.
      Sometimes I write about my findings in my blog.

